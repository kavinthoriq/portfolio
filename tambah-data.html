    <main>
        <main>
        <h2>Masukkan Data Karyawan Baru</h2>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="id_karyawan">ID Karyawan</label>
                <input type="text" id="id_karyawan" name="id_karyawan" placeholder="Contoh: DA-005" required>
            </div>

            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label for="spesialisasi">Spesialisasi</label>
                <input type="text" id="spesialisasi" name="spesialisasi" placeholder="Contoh: Business Intelligence" required>
            </div>

            <div class="form-group">
                <label>Pengalaman</label>
                <div class="radio-group">
                    <label><input type="radio" name="pengalaman" value="Junior" required> Junior (< 2 Tahun)</label>
                    <label><input type="radio" name="pengalaman" value="Mid"> Mid (2 - 5 Tahun)</label>
                    <label><input type="radio" name="pengalaman" value="Senior"> Senior (> 5 Tahun)</label>
                </div>
            </div>

            <div class="form-group">
                <label for="tools">Alat Utama (Tools)</label>
                <textarea id="tools" name="tools" rows="3" placeholder="Contoh: SQL, Python, Tableau..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Simpan Data</button>
        </form>
    </main>
    </main>
